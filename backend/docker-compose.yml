services:
  db:
    image: timescale/timescaledb:latest-pg17
    container_name: tauron-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-tauron}
    ports:
      - "5433:5432"
    volumes:
      - tauron_pgdata:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tauron"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tauron_pgdata:
